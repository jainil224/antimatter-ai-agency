<app-three-scene></app-three-scene>
<app-background-canvas></app-background-canvas>
<div class="page-container contact-page">
  <div class="content-split">
    
    <div class="text-panel">
      <h1 class="page-title">Initiate<br/><span class="text-accent">Protocol</span></h1>
      <p class="description">Secure connection established. Transmit your project parameters and our neural network will process the requirements.</p>

      <div class="contact-info">
        <div class="info-item">
          <span class="label">Encrypted Comms_</span>
          <span class="value">hello&#64;antimatter.ai</span>
        </div>
        <div class="info-item">
          <span class="label">Mainframe Location_</span>
          <span class="value">San Francisco, CA</span>
        </div>
      </div>
    </div>

    <div class="form-panel">
      <form class="contact-form" (submit)="$event.preventDefault()">
        <div class="form-group">
          <label for="name">ID DESIGNATION</label>
          <input type="text" id="name" placeholder="Enter name..." />
        </div>
        
        <div class="form-group">
          <label for="email">TRANSMISSION VECTOR</label>
          <input type="email" id="email" placeholder="Enter email address..." />
        </div>

        <div class="form-group">
          <label for="message">DATA PAYLOAD</label>
          <textarea id="message" rows="4" placeholder="Describe the optimal solution parameters..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Execute <span class="arrow">→</span></button>
      </form>
    </div>

  </div>
</div>
