<section class="case-studies" id="case-studies">
  <div class="cases-grid">
    <div class="cases-list">
      <h2>Case Studies</h2>
      
      <div class="case-item" *ngFor="let c of cases">
        <div class="case-header">
          <span class="case-title">{{ c.num }} &nbsp;&nbsp; {{ c.name }}</span>
          <span class="case-arrow">↗</span>
        </div>
        <div class="case-tags">
          <span class="tag" *ngFor="let tag of c.tags">{{ tag }}</span>
        </div>
      </div>
    </div>
    
    <div class="mockup-wrap">
      <div class="plane-device">
        <div class="plane-cam"></div>
        <div class="plane-screen">
          <div class="p-ui">
            <div class="p-header">
              <span class="p-logo">CLINIX AI</span>
              <span class="p-live"><span class="dot"></span> Live</span>
            </div>
            
            <div class="p-chart-area">
              <div class="p-stats">
                <div class="p-val">$2.4M</div>
                <div class="p-inc">↑ 18.4% this month</div>
              </div>
              <div class="p-chart"></div>
            </div>
            
            <div class="p-cards">
              <div class="p-card">
                <div class="p-c-label">Active Users</div>
                <div class="p-c-val">12,450</div>
              </div>
              <div class="p-card">
                <div class="p-c-label">Conversion</div>
                <div class="p-c-val">4.8%</div>
              </div>
            </div>
            
            <div class="p-prog-row">
              <div class="p-prog-label">Goal Completion</div>
              <div class="p-prog-wrap">
                <div class="p-prog-bar"></div>
              </div>
              <div class="p-prog-val">72%</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
